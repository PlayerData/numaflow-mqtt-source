name: Lint

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Cargo fmt
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings
