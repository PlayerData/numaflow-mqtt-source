name: Lint

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cargo fmt
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings
